name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (headless)
        run: |
          python -m pytest --ignore=tests/test_gui.py --ignore=tests/test_player_logic.py --tb=short -v

      - name: Run dry-run scripts
        run: |
          python scripts/dry_run_download.py
          python scripts/dry_run_auto_download.py --day friday
          python scripts/dry_run_auto_download.py --day wednesday
          python scripts/dry_run_config.py
          python scripts/dry_run_startup.py
