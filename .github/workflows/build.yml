name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: YoutubeWeekly-windows
          - os: macos-latest
            artifact: YoutubeWeekly-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          python -m pytest --ignore=tests/test_gui.py --ignore=tests/test_player_logic.py --tb=short -q

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller youtubeweekly.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/YoutubeWeekly/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: YoutubeWeekly-windows
          path: YoutubeWeekly-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: YoutubeWeekly-macos
          path: YoutubeWeekly-macos

      - name: Create archives
        run: |
          cd YoutubeWeekly-windows && zip -r ../YoutubeWeekly-windows.zip . && cd ..
          cd YoutubeWeekly-macos && zip -r ../YoutubeWeekly-macos.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YoutubeWeekly-windows.zip
            YoutubeWeekly-macos.zip
          generate_release_notes: true
